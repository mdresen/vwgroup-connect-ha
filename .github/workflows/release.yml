name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/vag_connect/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "ERROR: tag v$TAG does not match manifest.json version $MANIFEST"
            exit 1
          fi

      - name: Extract changelog section for this version
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 << 'PYTHON'
          import re, os
          version = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              content = f.read()
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          section = match.group(0).strip() if match else f"Release {version}"
          # Prepend install instructions for HACS users
          notes = f"""{section}

---

### Installation / Update

**HACS:** Update-Benachrichtigung erscheint automatisch.
**Manuell:** `custom_components/vag_connect/` ersetzen und HA neu starten.

**Repo:** https://github.com/its-me-prash/vag-connect-ha
"""
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          print(notes[:300])
          PYTHON

      - name: Build integration ZIP
        run: |
          cd custom_components
          zip -r ../vag_connect.zip vag_connect/ \
            -x "**/__pycache__/*" "**/*.pyc"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vag_connect.zip
          body_path: /tmp/release_notes.md
          name: "VAG Connect v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
