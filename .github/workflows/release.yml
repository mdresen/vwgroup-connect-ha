name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version aus manifest.json lesen
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/vag_connect/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Sicherstellen dass Tag und manifest.json Version übereinstimmen
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "FEHLER: Tag v$TAG stimmt nicht mit manifest.json Version $MANIFEST überein"
            exit 1
          fi

      - name: Changelog-Abschnitt für diese Version extrahieren
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 << 'PYTHON'
          import re, os
          with open('CHANGELOG.md') as f:
              content = f.read()
          # Abschnitt zwischen aktueller Version und nächster finden
          pattern = rf'## \[{re.escape(os.environ.get("VERSION", ""))}\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          section = match.group(0).strip() if match else "Keine Änderungen dokumentiert."
          with open('/tmp/release_notes.md', 'w') as f:
              f.write(section)
          print("Changelog-Abschnitt extrahiert:")
          print(section[:500])
          PYTHON
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: ZIP der Integration bauen
        run: |
          cd custom_components
          zip -r ../vag_connect.zip vag_connect/ \
            -x "**/__pycache__/*" "**/*.pyc"
          echo "ZIP-Größe: $(du -sh ../vag_connect.zip)"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: vag_connect.zip
          body_path: /tmp/release_notes.md
          name: "VAG Connect v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
