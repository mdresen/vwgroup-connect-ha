name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff homeassistant carconnectivity \
            carconnectivity-connector-audi \
            carconnectivity-connector-volkswagen \
            carconnectivity-connector-skoda \
            carconnectivity-connector-seatcupra

      - name: Ruff lint
        run: ruff check custom_components/

      - name: Validate manifest.json
        run: python -c "import json; json.load(open('custom_components/vag_connect/manifest.json'))"

      - name: Validate translations
        run: |
          python -c "import json; json.load(open('custom_components/vag_connect/translations/de.json'))"
          python -c "import json; json.load(open('custom_components/vag_connect/translations/en.json'))"

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: "home-assistant/actions/hassfest@master"

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
