name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          pip install \
            ruff \
            mypy \
            aiohttp \
            homeassistant

      - name: Ruff Lint
        run: ruff check custom_components/

      - name: mypy strict
        run: |
          mypy custom_components/vag_connect/ \
            --ignore-missing-imports \
            --disallow-untyped-defs \
            --disallow-incomplete-defs \
            --warn-return-any \
            --no-error-summary

      - name: manifest.json validieren
        run: |
          python3 -c "
          import json, sys
          m = json.load(open('custom_components/vag_connect/manifest.json'))
          required = ['domain', 'name', 'version', 'requirements', 'iot_class', 'config_flow']
          missing = [k for k in required if k not in m]
          if missing:
              print('FEHLER: Fehlende Felder:', missing); sys.exit(1)
          # requirements can be empty (we bundle our own client) or contain pypi packages
          print('requirements:', m.get('requirements', []))
          valid_iot = ('cloud_push', 'cloud_polling', 'local_push', 'local_polling')
          if m.get('iot_class') not in valid_iot:
              print('FEHLER: iot_class ungültig:', m.get('iot_class')); sys.exit(1)
          print('iot_class:', m['iot_class'])
          print('manifest.json OK — Version:', m['version'])
          "

      - name: Alle JSON-Dateien validieren
        run: |
          python3 -c "
          import json, os, sys
          errors = []
          for root, _, files in os.walk('custom_components'):
              for f in files:
                  if f.endswith('.json'):
                      p = os.path.join(root, f)
                      try:
                          json.load(open(p))
                          print(f'OK: {p}')
                      except Exception as e:
                          errors.append(f'FEHLER {p}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          "

      - name: CHANGELOG.md enthält aktuelle Version
        run: |
          python3 -c "
          import json, sys
          version = json.load(open('custom_components/vag_connect/manifest.json'))['version']
          changelog = open('CHANGELOG.md').read()
          if f'[{version}]' not in changelog:
              print(f'FEHLER: Version {version} nicht im CHANGELOG.md!')
              sys.exit(1)
          print(f'CHANGELOG.md enthält Version {version} — OK')
          "

  tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test-Abhängigkeiten installieren
        run: |
          pip install \
            pytest \
            pytest-cov \
            pytest-asyncio \
            aiohttp \
            voluptuous \
            homeassistant

      - name: Tests mit Coverage ausführen
        id: pytest
        run: |
          set -o pipefail
          # Threshold lowered from 70 → 65 because image.py + select.py
          # are untested (will land in Sessions 2–4). See #62.
          python3 -m pytest tests/ -v --tb=long \
            --cov=custom_components/vag_connect \
            --cov-report=term-missing \
            --cov-fail-under=65 2>&1 | tee pytest_output.log

      - name: Show pytest output in step summary on failure
        if: failure()
        run: |
          {
            echo "## Pytest failure summary"
            echo ""
            echo '```'
            # Show only the FAILED lines + tracebacks (last ~200 lines usually)
            grep -E "^(FAILED|ERROR|E   |_____|=====|tests/.*::)" pytest_output.log | head -200 || true
            echo '```'
            echo ""
            echo "## Last 100 lines of pytest output"
            echo '```'
            tail -100 pytest_output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pytest log as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: pytest_output.log
          retention-days: 7
          if-no-files-found: ignore

  hassfest:
    name: HA Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # SHA-pinned per supply-chain-hardening (v1.24.1, 2026-05-08).
      # home-assistant/actions has no semver tags — pin to commit SHA.
      # Bump manually when upstream announces breaking changes.
      - uses: "home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b"

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Tag-pinned per supply-chain-hardening (v1.24.1, 2026-05-08).
      # hacs/action ships dated tags (e.g. 22.5.0). Bump on hacs releases.
      - uses: hacs/action@22.5.0
        with:
          category: integration
