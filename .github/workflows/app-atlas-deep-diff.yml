name: App Atlas Deep Diff (manual)

# Phase A.3 — semantic diff between two APK versions for a specific brand.
#
# This is NOT a scheduled workflow. Trigger manually via the Actions
# tab when you want to investigate what changed semantically between
# two versions (typically after the daily watcher reports a bump).
#
# Why manual:
# - jadx full decompile = 5-15min per APK + 100-500MB output → too
#   heavy for daily runs
# - The value is in targeted investigation: "CUPRA bumped 2.16 →
#   2.18, what new endpoints / headers / scopes appeared?"
# - On-demand pattern keeps CI budget free for daily atlas + OLA
#   watcher work
#
# Output: PR opens with a single new markdown file at
# docs/research/app-atlas/diffs/{brand}_{old}_vs_{new}.md.
# Maintainer reviews + merges.

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand to deep-diff (e.g. cupra, audi, volkswagen)"
        required: true
        type: choice
        options:
          - seat
          - cupra
          - volkswagen
          - audi
          - skoda
          - volkswagen_na
          - porsche
      old_version:
        description: "Old version-name (e.g. 2.15.0)"
        required: true
      new_version:
        description: "New version-name (e.g. 2.16.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deep-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Java (jadx requires it)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install jadx
        run: |
          # Pin a recent stable release. Bump JADX_VERSION when
          # upstream ships notable improvements.
          JADX_VERSION="1.5.1"
          curl -fsSL "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -o /tmp/jadx.zip
          sudo unzip -q /tmp/jadx.zip -d /opt/jadx
          sudo ln -sf /opt/jadx/bin/jadx /usr/local/bin/jadx
          jadx --version

      - name: Install ripgrep (semantic-diff extraction)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ripgrep
          rg --version | head -1

      - name: Run deep diff
        run: |
          python scripts/app_atlas/run_deep_diff.py \
            --brand "${{ inputs.brand }}" \
            --old-version "${{ inputs.old_version }}" \
            --new-version "${{ inputs.new_version }}"

      - name: Open PR with diff report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRAND="${{ inputs.brand }}"
          OLD="${{ inputs.old_version }}"
          NEW="${{ inputs.new_version }}"
          REPORT_PATH="docs/research/app-atlas/diffs/${BRAND}_${OLD}_vs_${NEW}.md"

          if [ ! -f "$REPORT_PATH" ]; then
            echo "::error::Report file not generated at $REPORT_PATH"
            exit 1
          fi

          git config user.name "vw-group-connect-bot"
          git config user.email "noreply@github.com"
          BRANCH="auto/atlas-diff-${BRAND}-${OLD}-vs-${NEW}"
          git checkout -b "$BRANCH"
          git add "$REPORT_PATH"
          git commit -m "chore(atlas): deep-diff report for ${BRAND} ${OLD} → ${NEW}

          Auto-generated by .github/workflows/app-atlas-deep-diff.yml.
          jadx full-decompile + cross-version constant diff per
          Phase A.3.

          Maintainer review: scan added URLs/headers for actionable
          new endpoints; cross-reference with the brand's existing
          atlas page. Close PR if no action needed (report stays in
          repo as historical reference)."

          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(atlas): deep-diff report — ${BRAND} ${OLD} → ${NEW}" \
            --label "auto-atlas-diff" \
            --body "Phase A.3 deep-diff report for **${BRAND}**: ${OLD} → ${NEW}.

          See [\`${REPORT_PATH}\`](${REPORT_PATH}) for the full analysis.

          **What this shows**: new URL constants, header-key strings, and
          OAuth scopes that appeared (or disappeared) between these two
          versions. Targeted analysis — not raw \`diff -r\` noise.

          **Triage hints in the report** point at the highest-signal
          changes (new OLA-host URLs, new \`app-*\` headers, scope
          changes). If you find something actionable, open a separate
          integration PR; this PR just commits the report as a
          historical reference.

          _Auto-filed by manual \`workflow_dispatch\` run of \`.github/workflows/app-atlas-deep-diff.yml\`._"
