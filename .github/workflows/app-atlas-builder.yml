name: App Atlas Builder

# Cross-brand VAG app discovery pipeline. See docs/research/app-atlas/
# README.md for context + LEGAL.md for reverse-engineering disclosure.
#
# Phase A.1 (current): version-polling for all 7 brands via APKMirror.
# Phase A.2 (next):    APK download + apktool extraction + grep.
# Phase A.3 (later):   jadx decompile + cross-version semantic diff.
#
# Runs daily at 04:00 UTC (different from the upstream-ola-watcher's
# 08:00 UTC so the two don't compete for runner availability).
#
# When the version-name changes for a brand, this workflow:
#   1. Updates docs/research/app-atlas/{brand}.md
#   2. Updates the cross-brand summary
#   3. Auto-commits to a branch named auto/atlas-{date}
#   4. Opens a PR for human review (no auto-merge — same safety pattern
#      as the OLA watcher, in case APKMirror returned junk data)
#
# Idempotent: re-runs without version changes are no-ops.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_extract:
        description: "Force APK extraction for all brands (overrides version-change cache). Use to (re)build apk-cache from scratch."
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-atlas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install apktool (for Phase A.2 APK extraction)
        run: |
          # Ubuntu's apt-installed apktool is usually a few versions old
          # but works fine for our basic decode use-case. If it's not
          # available, we fall back gracefully — the build_atlas.py
          # apk_extractor logs an error per brand and continues without
          # APK findings, so the workflow still completes for
          # version-name polling.
          sudo apt-get update -qq
          sudo apt-get install -y -qq apktool ripgrep || \
            echo "::warning::apktool/ripgrep not installable — Phase A.2 APK extraction will skip"
          apktool --version || true
          rg --version | head -1 || true

      - name: Install apkeep (Google Play source for Phase A.2)
        run: |
          # apkeep (EFF) downloads the real Play Store APK directly — the
          # authoritative source, and the only one that covers brands no
          # mirror serves (e.g. Škoda). Pinned for reproducibility. On
          # failure, build_atlas falls back to APKCombo → Uptodown, so the
          # workflow still completes.
          APKEEP_VER="1.0.0"
          sudo curl -fsSL -o /usr/local/bin/apkeep \
            "https://github.com/EFForg/apkeep/releases/download/${APKEEP_VER}/apkeep-x86_64-unknown-linux-gnu" \
            && sudo chmod +x /usr/local/bin/apkeep \
            && apkeep --version \
            || echo "::warning::apkeep install failed — Phase A.2 falls back to the mirror chain"

      - name: Run atlas builder (Phase A.1 polling + A.2 APK extraction)
        # Optional Google Play credentials for apkeep. If unset, the
        # extractor falls back to the anonymous Aurora dispenser (turnkey
        # but rate-limited — may be blocked from GitHub Actions IPs, in
        # which case it falls back again to APKCombo → Uptodown). For
        # reliable CI, add a throwaway account's long-lived aas_token as
        # repo secrets APKEEP_EMAIL + APKEEP_AAS_TOKEN.
        env:
          APKEEP_EMAIL: ${{ secrets.APKEEP_EMAIL }}
          APKEEP_AAS_TOKEN: ${{ secrets.APKEEP_AAS_TOKEN }}
          APKEEP_AUTH_TOKEN: ${{ secrets.APKEEP_AUTH_TOKEN }}
        # APK extraction only fires when a brand's version-name changed
        # since last cache — so most days this stays under 1 minute.
        # When triggered via workflow_dispatch with force_extract=true,
        # extracts every brand regardless of cache state (~5-10min total).
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force_extract }}" = "true" ]; then
            FORCE_FLAG="--force-extract"
            echo "::notice::force_extract=true — extracting all 7 brands regardless of cache"
          fi
          python scripts/app_atlas/build_atlas.py --with-apk-extraction $FORCE_FLAG

      - name: Diff client_ids vs source (v2.10.4 watcher)
        id: client_id_diff
        run: |
          python scripts/app_atlas/diff_known_client_ids.py
          if [ -f .app-atlas-apk-cache/new-client-ids-found.md ]; then
            echo "new_ids=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_ids=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for new client_ids
        if: steps.client_id_diff.outputs.new_ids == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # De-dupe against an already-open issue from a previous run.
          EXISTING=$(gh issue list --state open --label apk-watcher --search 'in:title "new OAuth client_id"' --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already tracks new client_ids - adding comment."
            gh issue comment "$EXISTING" --body-file .app-atlas-apk-cache/new-client-ids-found.md
          else
            gh issue create \
              --title "apk-watcher: new OAuth client_id detected (${DATE})" \
              --label apk-watcher \
              --body-file .app-atlas-apk-cache/new-client-ids-found.md
          fi

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- '.app-atlas-cache.json' 'docs/research/app-atlas/'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ No version changes detected — nothing to commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📝 Changes detected:"
            git diff --stat -- '.app-atlas-cache.json' 'docs/research/app-atlas/'
          fi

      - name: Check for existing auto-PR (idempotency)
        id: existing
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Avoid spamming duplicate PRs while a previous one is still
          # open. Title-prefix match.
          EXISTING=$(gh pr list --state open --search 'in:title "chore(atlas): refresh"' --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — adding a comment instead."
            gh pr comment "$EXISTING" --body "Auto-watcher re-detected atlas changes on $(date -u +%Y-%m-%d). Force-pushing the refreshed version onto the same branch is risky, so this is just a reminder — please review + merge to clear the cycle."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Pull Request
        if: steps.changes.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "vw-group-connect-bot"
          git config user.email "noreply@github.com"
          DATE=$(date -u +%Y%m%d)
          BRANCH="auto/atlas-${DATE}"
          git checkout -b "$BRANCH"

          git add .app-atlas-cache.json docs/research/app-atlas/
          git commit -m "chore(atlas): refresh app-atlas via daily watcher

          Auto-generated by .github/workflows/app-atlas-builder.yml.
          Phase A.1: version-polling only (no APK extraction yet).

          Maintainer review: scan the diff for unexpected version
          jumps (e.g. SEAT going from 2.17.0 to 0.0.1 would suggest
          APKMirror returned junk — close PR + investigate). Otherwise
          just merge."

          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(atlas): refresh app-atlas via daily watcher ($(date -u +%Y-%m-%d))" \
            --label "auto-atlas" \
            --body "Daily App Atlas refresh detected version changes in one or more brand apps.

          See \`docs/research/app-atlas/_summary.md\` for the cross-brand matrix
          and the per-brand \`{brand}.md\` files for details.

          **Phase A.1 scope**: this PR only updates version-name tracking. No
          APK download or extraction yet (that's Phase A.2). The atlas pages
          show \`(Empty — Phase A.2 will populate ...)\` placeholders for the
          deeper findings.

          **Maintainer review**: scan the diff for unexpected jumps
          (e.g. a version going backward, or from \`5.4.1\` to something
          like \`0.0.1\` suggesting APKMirror returned junk). Otherwise
          just merge.

          _Auto-filed by \`.github/workflows/app-atlas-builder.yml\` on $(date -u +%Y-%m-%d). Idempotent — won't re-create this PR while it's open._"

      - name: Summary report
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "✅ App Atlas in sync — no PR needed."
          echo ""
          cat docs/research/app-atlas/_summary.md
