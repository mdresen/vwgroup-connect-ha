name: 🐛 Bug Report
description: Something doesn't work as expected / Etwas funktioniert nicht wie erwartet
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feedback! Please fill in as many fields as possible — it saves a lot of time.

        Danke für dein Feedback! Bitte fülle so viele Felder wie möglich aus — das spart enorm Zeit.

  - type: dropdown
    id: brand
    attributes:
      label: Vehicle brand / Fahrzeugmarke
      options:
        - Audi
        - Volkswagen EU
        - Škoda
        - SEAT
        - CUPRA
        - Volkswagen US/CA
        - Porsche
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country / Land
      placeholder: "e.g. Germany, Austria, UK, USA"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model + year / Modell + Baujahr
      placeholder: "e.g. Audi S6 2021, ID.4 2023, Cupra Born 2023"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VAG Connect Version
      placeholder: "e.g. 1.8.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2026.4.0"
    validations:
      required: true

  - type: dropdown
    id: official_app
    attributes:
      label: Does the same action work in the official manufacturer app? / Funktioniert die selbe Aktion in der offiziellen App?
      options:
        - "Yes / Ja"
        - "No / Nein"
        - "Partially / Teilweise"
        - "I don't know / Weiß ich nicht"
    validations:
      required: true

  - type: dropdown
    id: subscription
    attributes:
      label: Connected services subscription active? / Online-Services Abo aktiv?
      description: |
        Some brands (VW, CUPRA) block commands when the subscription expires —
        that's not a bug in this integration but a server-side restriction.

        Manche Marken (VW, CUPRA) sperren Befehle wenn das Abo abgelaufen ist —
        dann ist es kein Bug bei uns sondern eine serverseitige Einschränkung.
      options:
        - "Yes / Ja"
        - "No / Nein"
        - "I don't know / Weiß ich nicht"
    validations:
      required: true

  - type: dropdown
    id: spin
    attributes:
      label: S-PIN configured? / S-PIN konfiguriert?
      description: S-PIN is required for lock and some other commands / S-PIN ist nötig für Verriegeln und einige andere Befehle
      options:
        - "Yes / Ja"
        - "No / Nein"
        - "Not relevant / Nicht relevant"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened? / Was ist passiert?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should happen? / Was sollte passieren?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (redacted / geschwärzt)
      description: |
        HA → Settings → System → Logs → filter by "vag_connect".
        Enable debug logging via the integration → "Enable debug logging".

        HA → Einstellungen → System → Logs → nach "vag_connect" filtern.
        Debug-Logging über Integration → Debug-Logging aktivieren.

        **Privacy — required masking before posting:**
        - **VIN** → keep only last 6 chars (e.g. `***003577`). A full VIN ties to registration, insurance and ownership records.
        - **Email** → mask local part, e.g. `u***@***.com`
        - **Tokens** (`access_token`, `refresh_token`, `id_token`) → remove completely
        - **GPS** (`latitude`, `longitude`) → round to 1 decimal or remove
        - **S-PIN** → never share, even masked
        - **Account ID / user_id** → remove

        **Datenschutz — vor dem Posten Pflicht:**
        - **VIN** nur letzte 6 Zeichen (z.B. `***003577`). Eine vollständige VIN ist mit Zulassung, Versicherung und Eigentümerdaten verknüpft.
        - **Email** lokalen Teil schwärzen, z.B. `u***@***.com`
        - **Tokens** (`access_token`, `refresh_token`, `id_token`) komplett entfernen
        - **GPS** (`latitude`, `longitude`) auf 1 Nachkommastelle runden oder löschen
        - **S-PIN** nie teilen, auch nicht geschwärzt
        - **Account ID / user_id** entfernen
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics / Diagnose-Daten (optional)
      description: |
        Settings → Devices & Services → VAG Connect → ⋮ → Download diagnostics.
        Sensitive data (VIN, password, S-PIN, GPS, email, address, user_id) is auto-redacted by v1.8.x+.

        HA → Einstellungen → Integrationen → VAG Connect → 3-Punkte-Menü → Diagnose herunterladen.
        Sensible Daten (VIN, Passwort, S-PIN, GPS, Email, Adresse, user_id) werden ab v1.8.x automatisch geschwärzt.

        If you are on an older version: please open the JSON, mask VINs and email manually before pasting.
        Bei älterer Version: bitte JSON öffnen und VIN + Email vor dem Einfügen manuell schwärzen.
      render: json

  - type: checkboxes
    id: privacy_confirmation
    attributes:
      label: Privacy confirmation / Datenschutz-Bestätigung
      description: Required / Pflicht
      options:
        - label: I have masked VIN to last 6 chars and removed tokens, email, GPS and S-PIN from logs/diagnostics. / Ich habe die VIN auf die letzten 6 Zeichen gekürzt und Tokens, Email, GPS und S-PIN aus Logs/Diagnose entfernt.
          required: true
