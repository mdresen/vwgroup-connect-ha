name: 🚨 Error Reporter (1-Klick from HA)
description: Auto-generated by the v1.9.0 Error Reporter when integration errors accumulate. Click "Mehr erfahren" on the HA Repair-Notification → opens this form pre-filled.
title: "[Error Reporter] N recent error(s) on <brand>"
labels: ["error-report", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        🚨 **Error Reporter from HA**

        This template is normally **auto-filled** when you click "Mehr erfahren" on the Error Reporter Repair-Notification.

        💡 **Privacy:** VINs masked, Bearer/JWT/UUID/Email tokens stripped from messages and tracebacks. No credentials are included.

  - type: input
    id: brand
    attributes:
      label: Brand
      placeholder: "audi / volkswagen / skoda / seat / cupra / porsche / volkswagen_na"
    validations:
      required: true

  - type: input
    id: vag_connect_version
    attributes:
      label: VAG Connect Version
      placeholder: "v1.13.0"
    validations:
      required: true

  - type: textarea
    id: error_report
    attributes:
      label: Error Reporter dump (auto-pasted from HA notification)
      description: The full report from the Repair-Notification — masked traceback + API error message.
      placeholder: |
        ### 1. `APIError` at 2026-04-30T22:06:14Z
        - Endpoint: `get_status`
        - VIN: `***805377`

        ```
        API error 502 for ...: {"error":{"message":"Bad Gateway","code":4001}}
        ```
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this error occur?
      options:
        - "First time today"
        - "Multiple times today"
        - "Every poll for hours"
        - "Intermittent (weekly)"
        - "Don't know"
    validations:
      required: true

  - type: checkboxes
    id: privacy_confirm
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm the report contains only masked data (no full VIN / tokens / personal info).
          required: true
