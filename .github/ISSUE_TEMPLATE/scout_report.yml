name: 🛰️ Vehicle Data Scout Report
description: Auto-generated by the v1.9.0 Vehicle Data Scout. Click "Mehr erfahren" on the HA Repair-Notification → opens this form pre-filled.
title: "[Vehicle Data Scout] N new field(s) on <brand>"
labels: ["scout-report", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        🛰️ **Vehicle Data Scout Report**

        This template is normally **auto-filled** when you click "Mehr erfahren" on the HA Repair-Notification.
        If you're filing it manually, paste the report content from the notification body below.

        💡 **Privacy:** VINs are masked to last 6 chars, GPS rounded to 1 decimal, JWTs/UUIDs/Emails stripped. Nothing leaves your HA without explicit click.

  - type: input
    id: brand
    attributes:
      label: Brand
      placeholder: "audi / volkswagen / skoda / seat / cupra / porsche / volkswagen_na"
    validations:
      required: true

  - type: input
    id: vehicle
    attributes:
      label: Vehicle (model + year, optional)
      placeholder: "VW Golf 7 GTE 2015 / Audi S6 C8 2021 / Skoda Kodiaq iV 2026"

  - type: input
    id: vag_connect_version
    attributes:
      label: VAG Connect Version
      placeholder: "v1.13.0"
    validations:
      required: true

  - type: textarea
    id: scout_report
    attributes:
      label: Scout Report (auto-pasted from HA notification)
      description: The full Markdown table from the Repair-Notification.
      placeholder: |
        | Path | Sample (masked) | Endpoint | First seen |
        |---|---|---|---|
        | `userCapabilities.capabilitiesStatus.value` | `[52 items]` | `selectivestatus` | 2026-05-01T13:30:57Z |
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: privacy_confirm
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm the report contains only masked data (no full VIN / tokens / emails / precise GPS).
          required: true
