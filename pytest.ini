[pytest]
# v1.24.1 (2026-05-08 audit): minimal config so contributors can run
# `pytest tests/` locally after `pip install -r requirements-test.txt`.
# CI's full matrix lives in `.github/workflows/ci.yml`.

testpaths = tests
asyncio_mode = auto

# Tests that import from `homeassistant.*` will fail collection without a
# full HA dev install; they're collected but skipped via the marker below.
# Pure-Python tests (defensive helpers, parsers, MBB cache, etc.) run fine.
filterwarnings =
    ignore::DeprecationWarning:asyncio
