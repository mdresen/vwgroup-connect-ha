# Bubble Card — VAG Connect door / window / lock status
#
# Replace `audi_q4` with your vehicle's entity_id prefix.

type: 'custom:bubble-card'
card_type: pop-up
hash: '#audi_q4_security'
name: 'Security — Audi Q4 e-tron'
icon: mdi:lock
button_type: state
entity: lock.audi_q4_central_locking

cards:

  # ── Central lock control ────────────────────────────────────────
  - type: 'custom:bubble-card'
    card_type: button
    button_type: state
    entity: lock.audi_q4_central_locking
    name: Central locking
    icon: mdi:car-key
    show_state: true
    tap_action:
      action: toggle

  # ── Per-door status (FL / FR / RL / RR) ─────────────────────────
  - type: horizontal-stack
    cards:
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_door_front_left
        name: FL door
        icon: mdi:car-door
        show_state: true
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_door_front_right
        name: FR door
        icon: mdi:car-door
        show_state: true

  - type: horizontal-stack
    cards:
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_door_rear_left
        name: RL door
        icon: mdi:car-door
        show_state: true
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_door_rear_right
        name: RR door
        icon: mdi:car-door
        show_state: true

  # ── Trunk + hood ────────────────────────────────────────────────
  - type: horizontal-stack
    cards:
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_trunk_open
        name: Trunk
        icon: mdi:car-back
        show_state: true
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_hood_open
        name: Hood
        icon: mdi:car-side
        show_state: true

  # ── Windows aggregate (per-window if available) ─────────────────
  - type: 'custom:bubble-card'
    card_type: button
    button_type: state
    entity: binary_sensor.audi_q4_windows_open
    name: Windows
    icon: mdi:car-windshield
    show_state: true

  # ── Anti-theft alarm (Cariad-BFF VW/Audi only) ──────────────────
  # Phantom-gated: only appears for vehicles whose backend exposes it.
  - type: horizontal-stack
    cards:
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_alarm_active
        name: Alarm
        icon: mdi:alarm-light
        show_state: true
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: binary_sensor.audi_q4_siren_active
        name: Siren
        icon: mdi:bell-ring
        show_state: true

  # ── Parking address + position ──────────────────────────────────
  - type: 'custom:bubble-card'
    card_type: button
    button_type: state
    entity: sensor.audi_q4_parking_address
    name: Parked at
    icon: mdi:map-marker
    show_state: true
    tap_action:
      action: navigate
      navigation_path: /map        # opens HA map view

  # ── At-saved-location (Skoda v2.2.0+) ───────────────────────────
  # - type: 'custom:bubble-card'
  #   card_type: button
  #   button_type: state
  #   entity: binary_sensor.audi_q4_vehicle_at_saved_location
  #   name: At home/work
  #   icon: mdi:home-map-marker
  #   show_state: true

  # ── Honk + flash (action buttons) ───────────────────────────────
  - type: horizontal-stack
    cards:
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: button.audi_q4_flash
        name: Flash
        icon: mdi:car-light-high
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.audi_q4_flash
      - type: 'custom:bubble-card'
        card_type: button
        button_type: state
        entity: button.audi_q4_honk_and_flash
        name: Honk
        icon: mdi:bullhorn
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.audi_q4_honk_and_flash
